# Render blueprint for the FastAPI backend.
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo.
# Set the four secret env vars (sync:false) in the dashboard after the first deploy.
services:
  - type: web
    name: luad-backend
    runtime: python
    plan: free
    rootDir: .                       # repo root: backend. imports + agent_pipeline/ + data/ + scripts/
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: ANTHROPIC_API_KEY      # rotate before deploy; set in dashboard
        sync: false
      - key: NEO4J_URI              # https://<id>.databases.neo4j.io (Query API, 443)
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD         # rotate before deploy; set in dashboard
        sync: false
